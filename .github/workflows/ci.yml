name: CI

on:
push:
branches:
- main
- develop

pull_request:

jobs:
test:
runs-on: ubuntu-latest


strategy:
  matrix:
    python-version:
      - "3.11"
      - "3.12"

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: ${{ matrix.python-version }}

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip

      pip install \
        pytest \
        pytest-cov \
        PyQt6

  - name: Run Tests
    run: |
      pytest \
        --cov=. \
        --cov-report=xml \
        --cov-report=term

