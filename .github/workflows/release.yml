name: Release

on:
push:
tags:
- "v*"

jobs:
build:
runs-on: ubuntu-latest


permissions:
  contents: write

steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Install Dependencies
    run: |
      pip install pyinstaller pytest PyQt6

  - name: Run Tests
    run: |
      pytest

  - name: Build Executable
    run: |
      pyinstaller \
        --onefile \
        --windowed \
        --name water-reminder \
        app.py

  - name: Build Debian Package
    run: |
      mkdir -p package/DEBIAN
      mkdir -p package/usr/bin
      mkdir -p package/usr/share/applications

      cp dist/water-reminder \
         package/usr/bin/water-reminder

      cat > package/DEBIAN/control << EOF
      Package: water-reminder
      Version: ${GITHUB_REF_NAME#v}
      Section: utils
      Priority: optional
      Architecture: amd64
      Maintainer: Wasi Ahmad
      Description: Water reminder desktop application
      EOF

      cat > package/usr/share/applications/water-reminder.desktop << EOF
      [Desktop Entry]
      Type=Application
      Name=Water Reminder
      Exec=/usr/bin/water-reminder
      Terminal=false
      Categories=Utility;
      EOF

      dpkg-deb --build package

      mv package \
         water-reminder_${GITHUB_REF_NAME#v}_amd64.deb

  - name: Create Release
    uses: softprops/action-gh-release@v2
    with:
      files: water-reminder_*.deb

